<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>File Complaint - NagrikSetu</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="complain.css">
</head>
<body>

<div class="container">

  <div class="box">
    <h1>File a Complaint</h1>
    <p class="sub">Report your issue in a few simple steps</p>

    <form>

      <div class="input-group">
        <label>Title</label>
        <input type="text" placeholder="Short title of issue" required>
      </div>

      <div class="input-group">
        <label>Description</label>
        <textarea placeholder="Describe your issue..." required></textarea>
      </div>

      <div class="input-group">
        <label>Category</label>
        <select>
          <option>Road</option>
          <option>Electricity</option>
          <option>Water</option>
          <option>Garbage</option>
          <option>Other</option>
        </select>
      </div>

      <div class="input-group">
        <label>Location</label>
        <input type="text" placeholder="Enter location" required>
      </div>

      <button type="submit" class="btn-primary">Submit Complaint</button>

    </form>

  </div>

</div>

</body>
</html>
